<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Page Not Found</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to right, #CCFBF1 0%, #F3F4F6 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .error-container {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(15, 118, 110, 0.15);
        }
        h1 { color: #0F766E; font-size: 60px; margin: 0; }
        p { color: #1F2937; font-size: 18px; }
        a { color: #0F766E; text-decoration: none; font-weight: 700; }
        a:hover { color: #115E59; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>404</h1>
        <p>Page Not Found! 🔍</p>
        <a href="{{ url_for('index') }}">Back to Home</a>
    </div>
</body>
</html>
